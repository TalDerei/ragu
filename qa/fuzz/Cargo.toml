# cargo-fuzz harness for ragu_testing.
#
# Deliberately excluded from the top-level workspace (see `members` in the
# repo-root Cargo.toml). Fuzz targets require nightly toolchain + libfuzzer
# sanitizer flags that we don't want applied to ordinary `cargo build` /
# `cargo test` runs across the workspace, so this crate stands as its own
# workspace root via the empty `[workspace]` table below — the layout
# generated by `cargo fuzz init`.
#
# Run targets with `cargo fuzz run <target>` from this directory, or via the
# `fuzz.sh` helper alongside this file.

[package]
name = "ragu_testing-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

# Empty table: makes this crate its own workspace root, isolated from the
# repo-root workspace. Required by cargo-fuzz.
[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
# This workspace cannot inherit repo-root [workspace.dependencies]. Fuzzing is
# intentionally modern-only, so keep these direct ff/group/pasta_curves/rand
# entries in sync with the repo-root modern dependency set.
ff = { version = "0.14", default-features = false }
group = { version = "0.14", default-features = false }
pasta_curves = { git = "https://github.com/ebfull/pasta_curves", rev = "5a84fc0d13f738f54c43fb1f9e28ecf1d358dcf5", features = ["deferred"] }
ragu_testing = { path = "../../crates/ragu_testing" }
ragu_arithmetic = { path = "../../crates/ragu_arithmetic" }
ragu_primitives = { path = "../../crates/ragu_primitives" }
ragu_pasta = { path = "../../crates/ragu_pasta", features = ["baked"] }
ragu_core = { path = "../../crates/ragu_core" }
ragu_circuits = { path = "../../crates/ragu_circuits" }
ragu_pcd = { path = "../../crates/ragu_pcd", features = ["unstable-fuzzing"] }
rand = "0.10"

# Poseidon sponge: absorb/squeeze mode transitions + save/resume consistency
[[bin]]
name = "fuzz_poseidon_sponge"
path = "fuzz_targets/fuzz_poseidon_sponge.rs"
test = false
doc = false
bench = false

# Endoscalar: extract/lift roundtrip — circuit vs native agreement
[[bin]]
name = "fuzz_endoscalar"
path = "fuzz_targets/fuzz_endoscalar.rs"
test = false
doc = false
bench = false

# Simulator element ops: constraint satisfaction under arbitrary op sequences
[[bin]]
name = "fuzz_element_ops"
path = "fuzz_targets/fuzz_element_ops.rs"
test = false
doc = false
bench = false

# Circuit::witness pipeline: synthesis output matches native spec, trace
# pipeline agrees with Simulator on accept/reject, Registry::assemble_with_alpha
# leaks alpha into exactly one coefficient position.
[[bin]]
name = "fuzz_circuit_witness"
path = "fuzz_targets/fuzz_circuit_witness.rs"
test = false
doc = false
bench = false

# Algebraic identity bridging witness and constraint sides: for satisfying
# witnesses, r.revdot(r + r.dilate(z) + s(X,y) + t(X,z)) must equal
# circuit.ky(instance, y). Catches witness-pipeline regressions that would
# pass the cheaper checks in fuzz_circuit_witness.
[[bin]]
name = "fuzz_circuit_revdot_identity"
path = "fuzz_targets/fuzz_circuit_revdot_identity.rs"
test = false
doc = false
bench = false

# Witness-pinning soundness oracle: mutates one occupied coefficient of
# the assembled trace polynomial and requires the revdot constraint
# identity to reject. The constraint-side under-constrained-gadget
# oracle that fuzz_witness_cheat (Simulator-side) structurally cannot
# be.
[[bin]]
name = "fuzz_witness_pinning"
path = "fuzz_targets/fuzz_witness_pinning.rs"
test = false
doc = false
bench = false

# The "patcher" technique (issue #728): mutate one witness input, repair
# every downstream wire by re-tracing, and assert the assembled constraint
# identity matches an independent native oracle over a ragu_testing::substrate
# program (real enforce_zero anchors, full grammar minus value-fallible ops).
# Also cross-checks the Simulator verdict against the identity to catch
# driver-vs-wiring disagreements.
[[bin]]
name = "fuzz_circuit_cheat"
path = "fuzz_targets/fuzz_circuit_cheat.rs"
test = false
doc = false
bench = false

# The patcher with a real repair engine (issues #728, #793, #796): a
# recording Driver captures the constraint graph ragu emits for a
# ragu_testing::substrate program, then mutations to free advice wires are
# repaired by propagating through the *captured* constraints (not by
# re-running gadget logic). Disagreement with the substrate's native oracle
# is the under-constrained-advice signal that re-trace-based repair cannot
# see. Also runs the rank/nullity oracle, the zero-divisor and booleanity
# must-reject oracles, and a Playback cross-check of the recorder's capture.
[[bin]]
name = "fuzz_advice_patcher"
path = "fuzz_targets/fuzz_advice_patcher.rs"
test = false
doc = false
bench = false

# Completeness / over-constraint fuzzing (issues #728, #793): the dual of
# the patcher. For an anchorless program over the infallible vocabulary
# every preamble witness is valid, so ragu's real Simulator must accept all
# of them; a rejection is an over-constrained gadget (a completeness bug).
[[bin]]
name = "fuzz_completeness"
path = "fuzz_targets/fuzz_completeness.rs"
test = false
doc = false
bench = false

# Staging pipeline (issue #709 Layer 4): the same revdot identity as
# fuzz_circuit_revdot_identity, but applied to MultiStage-as-Circuit
# instances. Exercises StageBuilder wire reservation, StageGuard wire
# injection, MultiStage::witness adapter, and skip_gates recursion that
# the non-staged targets bypass.
[[bin]]
name = "fuzz_staging"
path = "fuzz_targets/fuzz_staging.rs"
test = false
doc = false
bench = false

# Structured polynomial revdot vs unstructured dot product
[[bin]]
name = "fuzz_revdot"
path = "fuzz_targets/fuzz_revdot.rs"
test = false
doc = false
bench = false

# Two-layer fold_products invariant
[[bin]]
name = "fuzz_fold_revdot"
path = "fuzz_targets/fuzz_fold_revdot.rs"
test = false
doc = false
bench = false

# Three-way s(X,Y) agreement: sxy vs sx.eval(y) vs sy.eval(x)
[[bin]]
name = "fuzz_sxy_agreement"
path = "fuzz_targets/fuzz_sxy_agreement.rs"
test = false
doc = false
bench = false

# Poseidon differential: circuit sponge vs native reference implementation
[[bin]]
name = "fuzz_poseidon_differential"
path = "fuzz_targets/fuzz_poseidon_differential.rs"
test = false
doc = false
bench = false

# Verifier rejection: corrupted proofs must never panic, must be rejected
[[bin]]
name = "fuzz_verify_reject"
path = "fuzz_targets/fuzz_verify_reject.rs"
test = false
doc = false
bench = false

# Mid-stream witness cheating: honest vs cheat paths through the Simulator.
# Simulator-robustness fuzzer; constraint-side soundness oracles live in
# fuzz_witness_pinning and fuzz_circuit_cheat.
[[bin]]
name = "fuzz_witness_cheat"
path = "fuzz_targets/fuzz_witness_cheat.rs"
test = false
doc = false
bench = false

# Driver-vs-driver metamorphic: same Vec<Op> through Simulator and
# Emulator<Wired>. Both should produce identical wire values; disagreement is
# a model-vs-real driver divergence.
[[bin]]
name = "fuzz_driver_metamorphic"
path = "fuzz_targets/fuzz_driver_metamorphic.rs"
test = false
doc = false
bench = false

# Witness-inspection coverage augmentation POC: same Op dispatch as
# fuzz_element_ops but with the final witness state hashed and spread across
# coverage branches. Compare against fuzz_element_ops to evaluate.
[[bin]]
name = "fuzz_witness_coverage"
path = "fuzz_targets/fuzz_witness_coverage.rs"
test = false
doc = false
bench = false

# Auxiliary tool (not a fuzz target). Emits a libFuzzer dictionary of Ragu's
# field-element constants. Regenerate dict.txt via:
#   cargo run --release --bin extract_dict > dict.txt
[[bin]]
name = "extract_dict"
path = "bin/extract_dict.rs"
test = false
doc = false
bench = false

# Algebraic-identity fuzz target: random Fp pairs through gadget API, assert
# commutativity / identity / inverse / distributivity / etc. hold uniformly.
[[bin]]
name = "fuzz_algebraic_identities"
path = "fuzz_targets/fuzz_algebraic_identities.rs"
test = false
doc = false
bench = false

# Element assertion-gadget tests: enforce_zero, enforce_root_of_unity,
# invert_with — positive cases must succeed in Simulator, negative cases
# must fail. Closes the assertion-gadget coverage gap.
[[bin]]
name = "fuzz_element_assertions"
path = "fuzz_targets/fuzz_element_assertions.rs"
test = false
doc = false
bench = false

# Bit-packing gadget: multipack(bits) returns Vec<Element> chunks. Each
# chunk's value is hand-computed and compared to the gadget's witness.
[[bin]]
name = "fuzz_multipack"
path = "fuzz_targets/fuzz_multipack.rs"
test = false
doc = false
bench = false

# Point gadget identities: complement fuzz_endoscalar's differential testing
# with direct algebraic identities (endo cube, double-negation,
# conditional_*), plus the only coverage of double_and_add_incomplete.
[[bin]]
name = "fuzz_point_identities"
path = "fuzz_targets/fuzz_point_identities.rs"
test = false
doc = false
bench = false

# Consistent trait: enforce_consistent on properly-allocated gadgets should
# always succeed (idempotent). Catches regressions in trait impls.
[[bin]]
name = "fuzz_consistent"
path = "fuzz_targets/fuzz_consistent.rs"
test = false
doc = false
bench = false

# IO write/buffer roundtrip: Write impls produce expected element counts
# and values, in the right order.
[[bin]]
name = "fuzz_io_roundtrip"
path = "fuzz_targets/fuzz_io_roundtrip.rs"
test = false
doc = false
bench = false
