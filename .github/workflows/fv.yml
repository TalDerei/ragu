name: Formal Verification CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      fv: ${{ steps.filter.outputs.fv }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            fv:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - 'qa/lean/**'
              - '.github/workflows/fv.yml'
              - '.github/actions/**'

  lean:
    name: exporter + lean
    needs: changes
    if: needs.changes.outputs.fv == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: lean-extraction

      - name: Check exported Lean files are up to date
        run: cargo run --locked -p lean_extraction -- check

      - name: Build Lean project
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          auto-config: false
          build: true
          build-args: "--wfail"
          test: false
          lint: false
          lake-package-directory: qa/lean
