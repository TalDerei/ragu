name: Formal Verification CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      fv: ${{ steps.filter.outputs.fv }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fv:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - 'qa/lean/**'
              - '.github/workflows/fv.yml'
              - '.github/actions/**'

  lean:
    name: exporter + lean
    needs: changes
    if: needs.changes.outputs.fv == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: lean-extraction

      - name: Check exported Lean files are up to date
        run: cargo run --locked -p lean_extraction -- check

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "--wfail"
          test: false
          lint: false
          lake-package-directory: qa/lean
