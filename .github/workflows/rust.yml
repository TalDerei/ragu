name: Rust CI
on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # Detect which files changed to conditionally run jobs
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      book: ${{ steps.filter.outputs.book }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/rust.yml'
              - '.github/actions/**'
            book:
              - 'book/**'

  fmt:
    name: rustfmt (nightly)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install pinned nightly rustfmt
        id: nightly
        uses: ./.github/actions/rust-nightly-setup
        with:
          components: rustfmt

      - name: Check formatting
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.nightly.outputs.toolchain }}
        run: cargo fmt --all -- --config-path rustfmt.nightly.toml --check

  clippy:
    name: clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --lib --tests --benches --locked -- -D warnings

  legacy-check:
    name: legacy dependency check
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: legacy-deps
      - name: Check runtime crates with legacy dependencies
        run: cargo check -p ragu_arithmetic -p ragu_pasta -p ragu_core -p ragu_primitives -p ragu_circuits -p ragu_pcd --lib --locked --no-default-features --features "alloc legacy-deps"

  # The `mock` feature is off by default and is the root crate's only API. It
  # builds against either crypto stack, so it gets its own job (the default
  # `clippy`/`test` runs leave it off) and exercises both stacks via a matrix.
  mock:
    name: mock (${{ matrix.stack }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [modern-deps, legacy-deps]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          components: clippy
          cache-suffix: mock-${{ matrix.stack }}
      - name: Run clippy (mock)
        run: cargo clippy -p ragu --no-default-features --features "mock ${{ matrix.stack }}" --lib --tests --locked -- -D warnings
      - name: Run tests (mock)
        run: cargo test --release -p ragu --no-default-features --features "mock ${{ matrix.stack }}" --locked

  proptests-fast:
    name: proptests (fast)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: proptests-fast
      - name: Run fast proptests
        run: cargo test --release -p ragu_arithmetic -p ragu_core --locked proptest
        env:
          PROPTEST_CASES: "64"

  test:
    name: test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: release
      - name: Run tests
        run: cargo test --release --all --locked

  test-32-bit:
    name: test (i686-unknown-linux-gnu)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          targets: i686-unknown-linux-gnu
          apt-packages: gcc-multilib
          cache-suffix: release
      - name: Run 32-bit tests
        run: cargo test --release --all --locked --target i686-unknown-linux-gnu

  # Ensure the mock API stays `no_std`-buildable on a bare-metal target. This is
  # the configuration downstream consumers (e.g. `zcash_tachyon`) compile for
  # `no_std`, so a regression here breaks their embedded builds. The other jobs
  # only exercise targets that have `std`, which is how past `no_std` breakage
  # (a std-only transitive dep sneaking in via default features) went unnoticed.
  build-nostd:
    name: build (thumbv7em-none-eabihf, no_std)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          targets: thumbv7em-none-eabihf
          cache-suffix: nostd
      - name: Build the mock API for a bare-metal no_std target
        run: cargo build -p ragu --lib --locked --no-default-features --features "mock legacy-deps" --target thumbv7em-none-eabihf

  bitrot:
    name: bitrot check
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: default-features
      - name: Build benchmarks and examples
        run: cargo build --benches --examples

  fuzz-check:
    name: fuzz harness check (nightly)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install pinned nightly toolchain
        id: nightly
        uses: ./.github/actions/rust-nightly-setup

      - name: Cache fuzz target directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: qa/fuzz/target
          key: ${{ runner.os }}-fuzz-target-${{ hashFiles('qa/fuzz/Cargo.toml') }}-${{ hashFiles('qa/fuzz/fuzz_targets/**/*.rs') }}-${{ hashFiles('qa/fuzz/bin/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-target-

      - name: cargo check fuzz harness
        working-directory: qa/fuzz
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.nightly.outputs.toolchain }}
        run: cargo check --bins

  docs:
    name: docs
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
        with:
          cache-suffix: docs
      - name: Check intra-doc links
        run: cargo doc --no-deps --all --locked --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  book:
    name: ragu book
    needs: changes
    if: needs.changes.outputs.book == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/rust-setup
      - name: Install mdbook and plugins
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a # v2.79.5
        with:
          tool: mdbook@0.4.52,mdbook-katex@0.9.4,mdbook-mermaid@0.16.2,mdbook-admonish@1.20.0
      - name: Build book
        run: mdbook build ./book

  # Aggregate gate: a single, stable required status check. It always runs —
  # even on non-Rust PRs where every job below is skipped — and fails only if a
  # needed job actually failed or was cancelled (skipped counts as success).
  # Require THIS in the ruleset instead of the individual job names: a skipped
  # matrix job (`test`) reports the un-expanded name `test (${{ matrix.os }})`,
  # so `test (ubuntu-latest)` etc. never report and block lean-/docs-only PRs.
  ci-required:
    name: ci-required
    if: always()
    needs:
      - changes
      - fmt
      - clippy
      - mock
      - proptests-fast
      - test
      - test-32-bit
      - build-nostd
      - bitrot
      - docs
      - book
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        # Pass the expansion through `env` rather than interpolating `${{ }}`
        # directly into `run:`, which zizmor's template-injection audit flags.
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "A required job failed or was cancelled:"
          echo "$NEEDS_JSON"
          exit 1
